  <script>
    (function () {
      localStorage.removeItem('theme'); 
      const theme = sessionStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
